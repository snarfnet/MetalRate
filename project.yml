name: MetalRate
options:
  bundleIdPrefix: com.tokyonasu
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: 83VGKGSQUH

targets:
  MetalRate:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - MetalRate
    settings:
      base:
        PRODUCT_NAME: MetalRate
        PRODUCT_BUNDLE_IDENTIFIER: com.tokyonasu.metalrate
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        INFOPLIST_FILE: MetalRate/Resources/Info.plist
    info:
      path: MetalRate/Resources/Info.plist
      properties:
        CFBundleDisplayName: "金属相場"
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSRequiresIPhoneOS: true
        LSApplicationCategoryType: public.app-category.finance
        ITSAppUsesNonExemptEncryption: false
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Dark
        NSUserTrackingUsageDescription: "広告の最適化のため、トラッキングの許可をお願いしています。"
        SKAdNetworkItems:
          - SKAdNetworkIdentifier: cstr6suwn9.skadnetwork
    scheme:
      testTargets: []
